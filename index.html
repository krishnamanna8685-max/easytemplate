<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Template</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; padding: 12px; }
        
        /* कैटेगरी बटन */
        .categories { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 20px 0; white-space: nowrap; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background-color: #1e2640; color: #94a3b8; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; text-decoration: none; }
        .cat-btn.active { background-color: #2ed573; color: #0b0f19; }

        /* टेम्पलेट ग्रिड layout */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 600px; margin: 0 auto; }
        .card { background-color: #111827; border-radius: 16px; overflow: hidden; border: 1px solid #1f2937; display: flex; flex-direction: column; }
        
        /* प्रिव्यू बॉक्स */
        .preview-box { height: 180px; position: relative; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); }
        .play-icon { width: 45px; height: 45px; background-color: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; backdrop-filter: blur(5px); }
        
        /* कार्ड की जानकारी */
        .info { padding: 10px 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .info h3 { font-size: 14px; font-weight: 600; color: #f3f4f6; margin-bottom: 8px; text-align: center; }
        
        /* Use Template बटन */
        .btn { display: block; width: 100%; text-align: center; background-color: #2ed573; color: #0b0f19; padding: 10px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 13px; }
    </style>
</head>
<body>

    <header style="text-align: center; padding: 25px 0 15px 0;">

    <div class="categories">

        <a href="#" class="cat-btn">Attitude</a>
        <a href="#" class="cat-btn">Devotional</a>

    <div class="grid">
        <!-- टेम्पलेट 1 -->
        <div class="card">
            <div class="preview-box">
                <div class="play-icon">▶</div>
            </div>
            <div class="info">
                <h3>Birthday Reel</h3>
                <a href="https://www.google.com" target="_blank" class="btn">Use Template</a>
            </div>
        </div>

        <!-- टेम्पलेट 2 -->
        <div class="card">
            <div class="preview-box" style="background: linear-gradient(135deg, #064e3b 0%, #111827 100%);">
                <div class="play-icon">▶</div>
            </div>
            <div class="info">
                <h3>Cinematic Edit</h3>
                <a href="https://www.google.com" target="_blank" class="btn">Use Template</a>
            </div>
        </div>

        <!-- टेम्पलेट 3 -->
        <div class="card">
            <div class="preview-box" style="background: linear-gradient(135deg, #7c1d1d 0%, #111827 100%);">
                <div class="play-icon">▶</div>
            </div>
            <div class="info">
                <h3>Attitude Status</h3>
                <a href="https://www.google.com" target="_blank" class="btn">Use Template</a>
            </div>
        </div>

        <!-- टेम्पलेट 4 -->
        <div class="card">
            <div class="preview-box" style="background: linear-gradient(135deg, #6b21a8 0%, #111827 100%);">

</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trending Video Templates</title>

  <style>
    :root {
      --primary: #111;
      --accent: #ff4d6d;
      --bg: #f8f9fa;
      --card: #fff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--primary);
    }

    header {
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 20px;
      background: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #eee;
    }

    /* Category Bar */
    .categories {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 12px;
      background: white;
    }

    .categories button {
      flex: 0 0 auto;
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      background: #eee;
      cursor: pointer;
      font-size: 13px;
    }

    .categories button.active {
      background: var(--accent);
      color: white;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    .card video,
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .btn {
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    /* Desktop refinement */
    @media(min-width: 768px) {
      header {
        font-size: 24px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
    }
  </style>
</head>

<body>

<header>🔥 Trending Video Templates</header>

<!-- Categories -->
<div class="categories" id="categoryBar">
  <button class="active" data-category="all">All</button>
  <button data-category="birthday">Birthday</button>
  <button data-category="cinematic">Cinematic</button>
  <button data-category="attitude">Attitude</button>
  <button data-category="devotional">Devotional</button>
</div>

<!-- Grid -->
<div class="grid" id="templateGrid"></div>

<script>
  // 🔹 Template Data (EDIT THIS ONLY)
  const templates = [
    {
      title: "Birthday Reel",
      category: "birthday",
      preview: "https://www.w3schools.com/html/mov_bbb.mp4",
      link: "https://example.com/template1"
    },
    {
      title: "Cinematic Edit",
      category: "cinematic",
      preview: "https://www.w3schools.com/html/movie.mp4",
      link: "https://example.com/template2"
    },
    {
      title: "Attitude Status",
      category: "attitude",
      preview: "https://via.placeholder.com/300x400",
      link: "https://example.com/template3"
    },
    {
      title: "Devotional Reel",
      category: "devotional",
      preview: "https://via.placeholder.com/300x400",
      link: "https://example.com/template4"
    }
  ];

  const grid = document.getElementById("templateGrid");
  const buttons = document.querySelectorAll(".categories button");

  function renderTemplates(filter = "all") {
    grid.innerHTML = "";

    const filtered = filter === "all"
      ? templates
      : templates.filter(t => t.category === filter);

    filtered.forEach(template => {
      const card = document.createElement("div");
      card.className = "card";

      const media = template.preview.includes(".mp4")
        ? `<video src="${template.preview}" autoplay muted loop playsinline></video>`
        : `<img src="${template.preview}" alt="preview"/>`;

      card.innerHTML = `
        ${media}
        <div class="card-content">
          <div class="title">${template.title}</div>
          <button class="btn" onclick="openTemplate('${template.link}')">
            Use Template
          </button>
        </div>
      `;

      grid.appendChild(card);
    });
  }

  function openTemplate(url) {
    window.open(url, "_blank");
  }

  // Category Filter
  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelector(".active").classList.remove("active");
      btn.classList.add("active");
      renderTemplates(btn.dataset.category);
    });
  });

  // Initial Load
  renderTemplates();
</script>

</body>
</html>
